<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future AI</title>
    <link rel="stylesheet" href="future(2).css">
</head>

<body>

    <div class="particles"></div>

    <div class="app-container glass-panel">

        <!-- SCREEN 1 -->
        <section id="welcome-screen" class="screen active">

            <div class="logo-container">

                <img src="logo.jpeg" class="glowing-orb">

                <h1>Future AI</h1><br>
                <h1>BY</h1><br>
                <h1>Future Banker Batch 38 </h1>
                <p>Know Your Future</p>

            </div>

            <div class="welcome-text">

                <h2>Step Into Tomorrow</h2>

                <p>
                    Experience the next generation of
                    AI financial protection analysis.
                </p>

            </div>

            <button id="start-btn" class="neon-btn">
                START AI
            </button>

        </section>

        <!-- SCREEN 2 -->
        <section id="chat-screen" class="screen hidden">

            <div class="chat-header">

                <h2>AI Assistant</h2>

                <span class="status">
                    Online
                </span>

            </div>

            <div id="chat-box" class="chat-box"></div>

            <div class="chat-input-area">

                <input
                    type="text"
                    id="chat-input"
                    placeholder="Type your name..."
                >

                <button id="send-btn" class="icon-btn">
                    ➤
                </button>

            </div>

            <div id="options-container"
                class="options-container">
            </div>

        </section>

        <!-- SCREEN 3 -->
        <section id="scan-screen"
            class="screen hidden">

            <div class="scan-container">

                <video id="camera-feed"
                    autoplay
                    muted
                    playsinline>
                </video>

                <div class="hud-overlay">

                    <div class="hud-circle outer"></div>

                    <div class="hud-circle inner"></div>

                    <div class="scan-line"></div>

                </div>

                <div class="scan-ui">

                    <h3 id="scan-text">
                        Initializing AI Core...
                    </h3>

                    <div class="progress-bar-container">

                        <div id="scan-progress"
                            class="progress-bar">
                        </div>

                    </div>

                    <p id="scan-percentage">
                        0%
                    </p>

                </div>

            </div>

        </section>

        <!-- SCREEN 4 -->
        <section id="video-screen"
            class="screen hidden">

            <video id="story-video"
                controls
                playsinline
                style="
                    width:100%;
                    height:100%;
                    object-fit:cover;
                ">
            </video>

        </section>

        <!-- SCREEN 5 -->
        <section id="recommendation-screen"
            class="screen hidden">

            <div class="recommendation-header">

                <h2>
                    Personalized Protection Blueprint
                </h2>

                <p>
                    Based on your financial profile
                </p>

            </div>

            <div id="dynamic-summary"></div>

            <button class="neon-btn"
                onclick="location.reload()">

                Restart Analysis

            </button>

        </section>

    </div>

    <script src="future2.js"></script>

</body>

</html>
